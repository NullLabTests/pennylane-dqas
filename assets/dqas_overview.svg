<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="'SF Mono','Monaco','Menlo',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#e070ff"/>
    </linearGradient>
    <linearGradient id="search" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e070ff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="optimize" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ffa94d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" fill="#6c63ff" font-size="20" font-weight="bold" letter-spacing="3">DIFFERENTIABLE QUANTUM</text>
  <text x="400" y="85" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" letter-spacing="2">ARCHITECTURE SEARCH</text>
  <text x="400" y="110" text-anchor="middle" fill="#e070ff" font-size="13">arXiv:2505.09653 · PennyLane · PyTorch</text>

  <!-- Core loop diagram -->
  <!-- Inner loop -->
  <rect x="150" y="150" width="500" height="180" rx="12" fill="none" stroke="#6c63ff" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="400" y="175" text-anchor="middle" fill="#6c63ff" font-size="12" letter-spacing="2">INNER LOOP: CIRCUIT PARAMETERS θ</text>
  <text x="400" y="195" text-anchor="middle" fill="#8888aa" font-size="11">Minimize ℒ_train on training data</text>

  <rect x="200" y="215" width="400" height="45" rx="8" fill="url(#circuit)" opacity="0.9"/>
  <text x="400" y="243" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">θ ← θ − η_θ · ∇_θ ℒ_train(θ, α)</text>

  <text x="400" y="295" text-anchor="middle" fill="#8888aa" font-size="11">Inner steps per outer iteration: K</text>

  <!-- Outer loop -->
  <rect x="150" y="370" width="500" height="180" rx="12" fill="none" stroke="#e070ff" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="400" y="395" text-anchor="middle" fill="#e070ff" font-size="12" letter-spacing="2">OUTER LOOP: ARCHITECTURE PARAMETERS α</text>
  <text x="400" y="415" text-anchor="middle" fill="#8888aa" font-size="11">Minimize ℒ_val on validation data</text>

  <rect x="200" y="435" width="400" height="45" rx="8" fill="url(#search)" opacity="0.9"/>
  <text x="400" y="463" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">α ← α − η_α · ∇_α ℒ_val(θ*, α)</text>

  <text x="400" y="515" text-anchor="middle" fill="#8888aa" font-size="11">Gumbel-Softmax relaxation for differentiability</text>

  <!-- Arrow between loops -->
  <line x1="400" y1="330" x2="400" y2="370" stroke="#ff6b9d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="550" x2="400" y2="590" stroke="#ff6b9d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="250" y="590" width="300" height="55" rx="27" fill="url(#optimize)" opacity="0.95" filter="url(#glow)"/>
  <text x="400" y="623" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">DISCOVERED ARCHITECTURE</text>

  <!-- Architecture representation -->
  <text x="400" y="680" text-anchor="middle" fill="#aaaacc" font-size="11" letter-spacing="1">Layer 1: [RY · RZ · CNOT]  Layer 2: [RX · RY · CZ]  Layer 3: [RX · H · CNOT]</text>

  <!-- Stats -->
  <rect x="150" y="700" width="500" height="55" rx="8" fill="none" stroke="#ffa94d" stroke-width="1" opacity="0.3"/>
  <text x="200" y="725" fill="#ffa94d" font-size="11">differentiable</text>
  <text x="310" y="725" fill="#ffa94d" font-size="11">automated</text>
  <text x="410" y="725" fill="#ffa94d" font-size="11">end-to-end</text>
  <text x="530" y="725" fill="#ffa94d" font-size="11">NISQ-ready</text>

  <!-- Footer -->
  <text x="400" y="775" text-anchor="middle" fill="#555577" font-size="10">NullLabTests/pennylane-dqas  ·  Built with PennyLane + PyTorch</text>
</svg>