<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'SF Mono','Monaco','Menlo',monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d30"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#8b7fff"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e070ff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ffa94d"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="url(#bg2)"/>

  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" letter-spacing="2">DQAS METHODOLOGY</text>
  <text x="450" y="70" text-anchor="middle" fill="#8888aa" font-size="12">End-to-end differentiable quantum circuit architecture search</text>

  <!-- Step 1 -->
  <rect x="100" y="110" width="700" height="95" rx="10" fill="none" stroke="#6c63ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="130" cy="130" r="16" fill="url(#step1)"/>
  <text x="130" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <text x="160" y="136" fill="#ffffff" font-size="15" font-weight="bold">Operation Pool Definition</text>
  <text x="160" y="158" fill="#aaaacc" font-size="12">Define candidate gates: {RX, RY, RZ, H, I, CNOT, CZ, SWAP}</text>
  <text x="160" y="178" fill="#777799" font-size="11">Each gate has arity (1 or 2 qubits) and parameter count (0 or 1)</text>

  <!-- Arrow -->
  <line x1="450" y1="205" x2="450" y2="235" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Step 2 -->
  <rect x="100" y="235" width="700" height="95" rx="10" fill="none" stroke="#e070ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="130" cy="255" r="16" fill="url(#step2)"/>
  <text x="130" y="260" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <text x="160" y="261" fill="#ffffff" font-size="15" font-weight="bold">Architecture Parameterization</text>
  <text x="160" y="283" fill="#aaaacc" font-size="12">Logits α[layer, position, op] — one distribution per circuit position</text>
  <text x="160" y="303" fill="#777799" font-size="11">Gumbel-Softmax: sample ĝ = argmax(α + g) with g ~ Gumbel(0,1)</text>

  <!-- Arrow -->
  <line x1="450" y1="330" x2="450" y2="360" stroke="#e070ff" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Step 3 -->
  <rect x="100" y="360" width="700" height="95" rx="10" fill="none" stroke="#ff6b9d" stroke-width="1.5" opacity="0.5"/>
  <circle cx="130" cy="380" r="16" fill="url(#step3)"/>
  <text x="130" y="385" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">3</text>
  <text x="160" y="386" fill="#ffffff" font-size="15" font-weight="bold">Bi-Level Optimization</text>
  <text x="160" y="408" fill="#aaaacc" font-size="12">Inner: minimize ℒ_train(θ, α) → optimize circuit parameters θ</text>
  <text x="160" y="428" fill="#aaaacc" font-size="12">Outer: minimize ℒ_val(θ*(α), α) → optimize architecture α</text>
  <text x="160" y="446" fill="#777799" font-size="11">Alternate K inner steps per outer step; Gumbel-Softmax flows gradients</text>

  <!-- Arrow -->
  <line x1="450" y1="455" x2="450" y2="485" stroke="#ff6b9d" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Step 4 -->
  <rect x="250" y="485" width="400" height="50" rx="25" fill="none" stroke="#ffa94d" stroke-width="2" stroke-dasharray="6,3" opacity="0.8"/>
  <text x="450" y="515" text-anchor="middle" fill="#ffa94d" font-size="14" font-weight="bold">DISCRETE ARCHITECTURE DERIVATION</text>
  <text x="450" y="545" text-anchor="middle" fill="#777799" font-size="11">argmax over α at each position → fixed circuit structure</text>

  <!-- Footer note -->
  <text x="450" y="585" text-anchor="middle" fill="#555577" font-size="10">arXiv:2505.09653 · Differentiable Quantum Architecture Search in Quantum-Enhanced Neural Network Parameter Generation</text>
</svg>